<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" role="img" aria-label="Gear MCP Server">
  <defs>
    <linearGradient id="gearFillLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5BA1D6"/>
      <stop offset="1" stop-color="#2C5F8D"/>
    </linearGradient>
  </defs>

  <!-- Gear icon (8 teeth) -->
  <g transform="translate(60 60)">
    <g fill="url(#gearFillLight)">
      <rect x="-5" y="-34" width="10" height="14" rx="2"/>
      <rect x="-5" y="-34" width="10" height="14" rx="2" transform="rotate(45)"/>
      <rect x="-5" y="-34" width="10" height="14" rx="2" transform="rotate(90)"/>
      <rect x="-5" y="-34" width="10" height="14" rx="2" transform="rotate(135)"/>
      <rect x="-5" y="-34" width="10" height="14" rx="2" transform="rotate(180)"/>
      <rect x="-5" y="-34" width="10" height="14" rx="2" transform="rotate(225)"/>
      <rect x="-5" y="-34" width="10" height="14" rx="2" transform="rotate(270)"/>
      <rect x="-5" y="-34" width="10" height="14" rx="2" transform="rotate(315)"/>
    </g>
    <circle r="24" fill="url(#gearFillLight)"/>
    <circle r="9" fill="#FFFFFF"/>
  </g>

  <!-- Wordmark -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
    <text x="125" y="58" font-size="42" font-weight="700" fill="#1F2D3D" letter-spacing="-1">Gear</text>
    <text x="232" y="58" font-size="42" font-weight="700" fill="#2C5F8D" letter-spacing="-1">MCP</text>
    <text x="126" y="86" font-size="16" font-weight="500" fill="#6B7C8C" letter-spacing="0.5">MCP server for the Godot editor</text>
  </g>
</svg>
