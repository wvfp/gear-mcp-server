<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#478cbf"/>
      <stop offset="100%" style="stop-color:#79c0ff"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e6edf3" font-family="sans-serif" font-size="24" font-weight="bold">Gear-Godot-MCP 架构</text>

  <!-- MCP Client (left) -->
  <g transform="translate(100, 250)" filter="url(#shadow)">
    <rect x="-80" y="-60" width="160" height="120" rx="10" fill="#21262d" stroke="#478cbf" stroke-width="2"/>
    <text y="-25" text-anchor="middle" fill="#79c0ff" font-family="monospace" font-size="14" font-weight="bold">MCP Client</text>
    <text y="0" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="11">Claude Desktop</text>
    <text y="18" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="11">Cursor / Cline</text>
    <rect x="-50" y="30" width="100" height="20" rx="4" fill="#478cbf"/>
    <text y="45" text-anchor="middle" fill="white" font-family="sans-serif" font-size="11">JSON-RPC</text>
  </g>

  <!-- Arrow 1 -->
  <g stroke="#478cbf" stroke-width="2" fill="none">
    <path d="M200,250 L280,250" stroke-dasharray="6,3"/>
    <polygon points="290,250 275,245 275,255" fill="#478cbf"/>
  </g>

  <!-- Gear Server (center) -->
  <g transform="translate(400, 250)" filter="url(#shadow)">
    <rect x="-100" y="-80" width="200" height="160" rx="10" fill="#21262d" stroke="#79c0ff" stroke-width="2"/>
    <text y="-45" text-anchor="middle" fill="#79c0ff" font-family="monospace" font-size="16" font-weight="bold">Gear Server</text>
    <text y="-20" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="11">95+ Tools</text>

    <!-- Tools grid -->
    <g transform="translate(-80, 0)">
      <rect width="50" height="25" rx="4" fill="#1f6feb"/>
      <text x="25" y="17" text-anchor="middle" fill="white" font-family="sans-serif" font-size="9">Scene</text>
    </g>
    <g transform="translate(-20, 0)">
      <rect width="50" height="25" rx="4" fill="#238636"/>
      <text x="25" y="17" text-anchor="middle" fill="white" font-family="sans-serif" font-size="9">Script</text>
    </g>
    <g transform="translate(40, 0)">
      <rect width="50" height="25" rx="4" fill="#9e6a03"/>
      <text x="25" y="17" text-anchor="middle" fill="white" font-family="sans-serif" font-size="9">Debug</text>
    </g>
    <g transform="translate(-80, 32)">
      <rect width="50" height="25" rx="4" fill="#8250df"/>
      <text x="25" y="17" text-anchor="middle" fill="white" font-family="sans-serif" font-size="9">LSP</text>
    </g>
    <g transform="translate(-20, 32)">
      <rect width="50" height="25" rx="4" fill="#bf4b8a"/>
      <text x="25" y="17" text-anchor="middle" fill="white" font-family="sans-serif" font-size="9">Input</text>
    </g>
    <g transform="translate(40, 32)">
      <rect width="50" height="25" rx="4" fill="#cf222e"/>
      <text x="25" y="17" text-anchor="middle" fill="white" font-family="sans-serif" font-size="9">Assets</text>
    </g>

    <rect x="-50" y="65" width="100" height="20" rx="4" fill="#478cbf"/>
    <text y="80" text-anchor="middle" fill="white" font-family="sans-serif" font-size="11">WebSocket</text>
  </g>

  <!-- Arrow 2 -->
  <g stroke="#478cbf" stroke-width="2" fill="none">
    <path d="M520,250 L600,250" stroke-dasharray="6,3"/>
    <polygon points="610,250 595,245 595,255" fill="#478cbf"/>
  </g>

  <!-- Godot Engine (right) -->
  <g transform="translate(700, 250)" filter="url(#shadow)">
    <rect x="-90" y="-70" width="180" height="140" rx="10" fill="#21262d" stroke="#478cbf" stroke-width="2"/>
    <text y="-35" text-anchor="middle" fill="#478cbf" font-family="sans-serif" font-size="18" font-weight="bold">Godot Engine</text>
    <text y="-10" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="11">4.2+</text>

    <!-- Godot icon simplified -->
    <g transform="translate(0, 35)">
      <circle r="25" fill="#478cbf" opacity="0.2"/>
      <path d="M-12,-8 L12,-8 L12,8 L-12,8 Z M-8,-15 L8,-15 L8,-8 L-8,-8 Z M-8,8 L8,8 L8,15 L-8,15 Z" fill="#478cbf"/>
    </g>

    <text y="78" text-anchor="middle" fill="#a6e3a1" font-family="sans-serif" font-size="10">✓ Editor + Game</text>
  </g>

  <!-- Bottom labels -->
  <g transform="translate(100, 420)">
    <text text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="12">AI Assistant</text>
  </g>
  <g transform="translate(400, 420)">
    <text text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="12">Tool Execution Layer</text>
  </g>
  <g transform="translate(700, 420)">
    <text text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="12">Game Engine</text>
  </g>
</svg>