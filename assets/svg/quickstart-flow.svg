<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#478cbf"/>
    </marker>
  </defs>

  <rect width="800" height="350" fill="url(#bgGrad3)" rx="12"/>

  <text x="400" y="30" text-anchor="middle" fill="#e6edf3" font-family="sans-serif" font-size="20" font-weight="bold">快速开始流程</text>

  <!-- Step 1 -->
  <g transform="translate(120, 120)">
    <circle cx="0" cy="0" r="35" fill="#478cbf"/>
    <text x="0" y="8" text-anchor="middle" fill="white" font-family="sans-serif" font-size="24" font-weight="bold">1</text>
    <text x="0" y="65" text-anchor="middle" fill="#e6edf3" font-family="sans-serif" font-size="13" font-weight="bold">启动 Gear</text>
    <text x="0" y="82" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="10">npx -y gear</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="165" y1="120" x2="235" y2="120" stroke="#478cbf" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2 -->
  <g transform="translate(300, 120)">
    <circle cx="0" cy="0" r="35" fill="#238636"/>
    <text x="0" y="8" text-anchor="middle" fill="white" font-family="sans-serif" font-size="24" font-weight="bold">2</text>
    <text x="0" y="65" text-anchor="middle" fill="#e6edf3" font-family="sans-serif" font-size="13" font-weight="bold">配置 MCP</text>
    <text x="0" y="82" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="10">添加 godot server</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="345" y1="120" x2="415" y2="120" stroke="#478cbf" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 3 -->
  <g transform="translate(480, 120)">
    <circle cx="0" cy="0" r="35" fill="#9e6a03"/>
    <text x="0" y="8" text-anchor="middle" fill="white" font-family="sans-serif" font-size="24" font-weight="bold">3</text>
    <text x="0" y="65" text-anchor="middle" fill="#e6edf3" font-family="sans-serif" font-size="13" font-weight="bold">AI 分析</text>
    <text x="0" y="82" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="10">项目结构</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="525" y1="120" x2="595" y2="120" stroke="#478cbf" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 4 -->
  <g transform="translate(660, 120)">
    <circle cx="0" cy="0" r="35" fill="#8250df"/>
    <text x="0" y="8" text-anchor="middle" fill="white" font-family="sans-serif" font-size="24" font-weight="bold">4</text>
    <text x="0" y="65" text-anchor="middle" fill="#e6edf3" font-family="sans-serif" font-size="13" font-weight="bold">执行工具</text>
    <text x="0" y="82" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="10">操控 Godot</text>
  </g>

  <!-- Bottom example -->
  <g transform="translate(400, 260)">
    <rect x="-300" y="-40" width="600" height="80" rx="8" fill="#21262d" stroke="#30363d"/>
    <text x="0" y="-15" text-anchor="middle" fill="#79c0ff" font-family="sans-serif" font-size="12" font-weight="bold">示例对话</text>
    <text x="-280" y="10" fill="#a6e3a1" font-family="monospace" font-size="11">"创建 scenes/Player.tscn，根节点用 CharacterBody2D"</text>
    <text x="-280" y="28" fill="#8b949e" font-family="monospace" font-size="11">→ Gear 自动调用 scene_create + node_add</text>
  </g>
</svg>