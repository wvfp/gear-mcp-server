<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" role="img" aria-label="Tool domains by category">
  <defs>
    <style>
      .cat       { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 11px; font-weight: 700; fill: #1F2D3D; letter-spacing: 0.4px; }
      .cat-count { font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 10px; font-weight: 700; fill: #94A3B8; }
      .count     { font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 10px; font-weight: 700; fill: #FFFFFF; opacity: 0.9; }
      .chip      { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 10px; font-weight: 600; fill: #FFFFFF; }
      .total     { font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 10px; font-weight: 700; fill: #FFFFFF; }
    </style>
  </defs>

  <rect width="760" height="360" rx="12" fill="#F8FAFC"/>

  <!-- Row 1: Files & Project | Scene & World -->
  <g transform="translate(20 24)">
    <!-- Col 1: Files & Project (16) — blue -->
    <g>
      <rect x="0" y="-2" width="3" height="42" rx="1.5" fill="#2C5F8D"/>
      <text x="10" y="11" class="cat">FILES &amp; PROJECT</text>
      <text x="350" y="11" class="cat-count" text-anchor="end">16 tools</text>
      <g transform="translate(10 18)">
        <g><rect width="70" height="22" rx="4" fill="#2C5F8D"/><text x="35" y="15" class="chip" text-anchor="middle">file</text><text x="64" y="15" class="count" text-anchor="end">3</text></g>
        <g transform="translate(76 0)"><rect width="84" height="22" rx="4" fill="#2C5F8D"/><text x="42" y="15" class="chip" text-anchor="middle">project</text><text x="78" y="15" class="count" text-anchor="end">5</text></g>
        <g transform="translate(166 0)"><rect width="84" height="22" rx="4" fill="#2C5F8D"/><text x="42" y="15" class="chip" text-anchor="middle">classdb</text><text x="78" y="15" class="count" text-anchor="end">3</text></g>
        <g transform="translate(256 0)"><rect width="78" height="22" rx="4" fill="#2C5F8D"/><text x="39" y="15" class="chip" text-anchor="middle">import</text><text x="72" y="15" class="count" text-anchor="end">5</text></g>
      </g>
    </g>
    <!-- Col 2: Scene & World (18) — green -->
    <g transform="translate(370 0)">
      <rect x="0" y="-2" width="3" height="42" rx="1.5" fill="#059669"/>
      <text x="10" y="11" class="cat">SCENE &amp; WORLD</text>
      <text x="350" y="11" class="cat-count" text-anchor="end">18 tools</text>
      <g transform="translate(10 18)">
        <g><rect width="66" height="22" rx="4" fill="#059669"/><text x="33" y="15" class="chip" text-anchor="middle">scene</text><text x="60" y="15" class="count" text-anchor="end">10</text></g>
        <g transform="translate(72 0)"><rect width="80" height="22" rx="4" fill="#059669"/><text x="40" y="15" class="chip" text-anchor="middle">runtime</text><text x="74" y="15" class="count" text-anchor="end">4</text></g>
        <g transform="translate(158 0)"><rect width="76" height="22" rx="4" fill="#059669"/><text x="38" y="15" class="chip" text-anchor="middle">tilemap</text><text x="70" y="15" class="count" text-anchor="end">2</text></g>
        <g transform="translate(240 0)"><rect width="92" height="22" rx="4" fill="#059669"/><text x="46" y="15" class="chip" text-anchor="middle">navigation</text><text x="86" y="15" class="count" text-anchor="end">2</text></g>
      </g>
    </g>
  </g>

  <!-- Row 2: Code & Debug | Editor & Plugin -->
  <g transform="translate(20 110)">
    <!-- Col 1: Code & Debug (13) — purple -->
    <g>
      <rect x="0" y="-2" width="3" height="42" rx="1.5" fill="#7C3AED"/>
      <text x="10" y="11" class="cat">CODE &amp; DEBUG</text>
      <text x="350" y="11" class="cat-count" text-anchor="end">13 tools</text>
      <g transform="translate(10 18)">
        <g><rect width="70" height="22" rx="4" fill="#7C3AED"/><text x="35" y="15" class="chip" text-anchor="middle">script</text><text x="64" y="15" class="count" text-anchor="end">3</text></g>
        <g transform="translate(76 0)"><rect width="70" height="22" rx="4" fill="#7C3AED"/><text x="35" y="15" class="chip" text-anchor="middle">debug</text><text x="64" y="15" class="count" text-anchor="end">10</text></g>
      </g>
    </g>
    <!-- Col 2: Editor & Plugin (19) — orange -->
    <g transform="translate(370 0)">
      <rect x="0" y="-2" width="3" height="42" rx="1.5" fill="#D97706"/>
      <text x="10" y="11" class="cat">EDITOR &amp; PLUGIN</text>
      <text x="350" y="11" class="cat-count" text-anchor="end">19 tools</text>
      <g transform="translate(10 18)">
        <g><rect width="60" height="22" rx="4" fill="#D97706"/><text x="30" y="15" class="chip" text-anchor="middle">editor</text><text x="54" y="15" class="count" text-anchor="end">6</text></g>
        <g transform="translate(64 0)"><rect width="76" height="22" rx="4" fill="#D97706"/><text x="38" y="15" class="chip" text-anchor="middle">autoload</text><text x="70" y="15" class="count" text-anchor="end">4</text></g>
        <g transform="translate(144 0)"><rect width="60" height="22" rx="4" fill="#D97706"/><text x="30" y="15" class="chip" text-anchor="middle">plugin</text><text x="54" y="15" class="count" text-anchor="end">3</text></g>
        <g transform="translate(208 0)"><rect width="60" height="22" rx="4" fill="#D97706"/><text x="30" y="15" class="chip" text-anchor="middle">signal</text><text x="54" y="15" class="count" text-anchor="end">3</text></g>
        <g transform="translate(272 0)"><rect width="60" height="22" rx="4" fill="#D97706"/><text x="30" y="15" class="chip" text-anchor="middle">theme</text><text x="54" y="15" class="count" text-anchor="end">3</text></g>
      </g>
    </g>
  </g>

  <!-- Row 3: Media | Input & Identity -->
  <g transform="translate(20 168)">
    <!-- Col 1: Media (14) — pink -->
    <g>
      <rect x="0" y="-2" width="3" height="42" rx="1.5" fill="#EC4899"/>
      <text x="10" y="11" class="cat">MEDIA</text>
      <text x="350" y="11" class="cat-count" text-anchor="end">14 tools</text>
      <g transform="translate(10 18)">
        <g><rect width="82" height="22" rx="4" fill="#EC4899"/><text x="41" y="15" class="chip" text-anchor="middle">resource</text><text x="76" y="15" class="count" text-anchor="end">5</text></g>
        <g transform="translate(88 0)"><rect width="70" height="22" rx="4" fill="#EC4899"/><text x="35" y="15" class="chip" text-anchor="middle">audio</text><text x="64" y="15" class="count" text-anchor="end">4</text></g>
        <g transform="translate(164 0)"><rect width="94" height="22" rx="4" fill="#EC4899"/><text x="47" y="15" class="chip" text-anchor="middle">animation</text><text x="88" y="15" class="count" text-anchor="end">5</text></g>
      </g>
    </g>
    <!-- Col 2: Input & Identity (3) — teal -->
    <g transform="translate(370 0)">
      <rect x="0" y="-2" width="3" height="42" rx="1.5" fill="#0D9488"/>
      <text x="10" y="11" class="cat">INPUT &amp; IDENTITY</text>
      <text x="350" y="11" class="cat-count" text-anchor="end">3 tools</text>
      <g transform="translate(10 18)">
        <g><rect width="70" height="22" rx="4" fill="#0D9488"/><text x="35" y="15" class="chip" text-anchor="middle">input</text><text x="64" y="15" class="count" text-anchor="end">1</text></g>
        <g transform="translate(76 0)"><rect width="60" height="22" rx="4" fill="#0D9488"/><text x="30" y="15" class="chip" text-anchor="middle">uid</text><text x="54" y="15" class="count" text-anchor="end">2</text></g>
      </g>
    </g>
  </g>

  <!-- Row 4: Build & Export | AI Workflow -->
  <g transform="translate(20 224)">
    <!-- Col 1: Build & Export (2) — gray -->
    <g>
      <rect x="0" y="-2" width="3" height="42" rx="1.5" fill="#6B7280"/>
      <text x="10" y="11" class="cat">BUILD &amp; EXPORT</text>
      <text x="350" y="11" class="cat-count" text-anchor="end">2 tools</text>
      <g transform="translate(10 18)">
        <g><rect width="78" height="22" rx="4" fill="#6B7280"/><text x="39" y="15" class="chip" text-anchor="middle">export</text><text x="72" y="15" class="count" text-anchor="end">2</text></g>
      </g>
    </g>
    <!-- Col 2: AI Workflow (24) — red -->
    <g transform="translate(370 0)">
      <rect x="0" y="-2" width="3" height="42" rx="1.5" fill="#DC2626"/>
      <text x="10" y="11" class="cat">AI WORKFLOW</text>
      <text x="350" y="11" class="cat-count" text-anchor="end">24 tools</text>
      <g transform="translate(10 18)">
        <g><rect width="64" height="22" rx="4" fill="#DC2626"/><text x="32" y="15" class="chip" text-anchor="middle">intent</text><text x="58" y="15" class="count" text-anchor="end">9</text></g>
        <g transform="translate(68 0)"><rect width="56" height="22" rx="4" fill="#DC2626"/><text x="28" y="15" class="chip" text-anchor="middle">meta</text><text x="50" y="15" class="count" text-anchor="end">2</text></g>
        <g transform="translate(128 0)"><rect width="64" height="22" rx="4" fill="#DC2626"/><text x="32" y="15" class="chip" text-anchor="middle">assets</text><text x="58" y="15" class="count" text-anchor="end">3</text></g>
        <g transform="translate(196 0)"><rect width="48" height="22" rx="4" fill="#DC2626"/><text x="24" y="15" class="chip" text-anchor="middle">dx</text><text x="42" y="15" class="count" text-anchor="end">4</text></g>
        <g transform="translate(248 0)"><rect width="80" height="22" rx="4" fill="#DC2626"/><text x="40" y="15" class="chip" text-anchor="middle">testing</text><text x="74" y="15" class="count" text-anchor="end">6</text></g>
      </g>
    </g>
  </g>

  <!-- Resources bar -->
  <g transform="translate(20 312)">
    <rect width="720" height="28" rx="6" fill="#1F2D3D"/>
    <text x="14" y="19" class="total">RESOURCES</text>
    <text x="116" y="19" class="chip">5  ·  godot://editor/context, project/info, scene/{path}, script/{path}, resource/{path}</text>
  </g>
</svg>
